<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAgent - AI Study Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 EduAgent</h1>
            <p>Your AI-Powered Study Companion</p>
        </header>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('explain', this)">📚 Explain Topic</button>
            <button class="tab" onclick="switchTab('quiz', this)">📝 Generate Quiz</button>
            <button class="tab" onclick="switchTab('plan', this)">📅 Study Plan</button>
        </div>
        <div class="input-section">
            <input type="text" id="topicInput" placeholder="Enter any topic... e.g. Python, Photosynthesis" />
            <button onclick="runAction()">✨ Go!</button>
        </div>
        <div class="output-section" id="output">
            <p>Enter a topic above to get started! 🚀</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
